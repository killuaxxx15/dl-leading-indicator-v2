name: Update Indicators

on:
  schedule:
    - cron: '0 22 * * *'  # 10 PM UTC = 6 AM SGT, daily
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch indicators
        run: python fetch_indicators.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/indicators.json
          git diff --cached --quiet && echo "No changes — skipping commit" && exit 0
          git commit -m "chore: update indicators $(date -u +%Y-%m-%d)"
          git push
